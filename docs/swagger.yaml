definitions:
  handlers.CreateUserRequest:
    properties:
      inviteCode:
        type: string
      name:
        type: string
      registrationToken:
        type: string
    required:
    - inviteCode
    - name
    - registrationToken
    type: object
  handlers.LocationResponse:
    properties:
      accuracy:
        type: number
      id:
        type: integer
      latitude:
        type: number
      longitude:
        type: number
      timestamp:
        type: string
      userID:
        type: integer
    type: object
  handlers.PostLocationRequest:
    properties:
      accuracy:
        type: number
      latitude:
        type: number
      longitude:
        type: number
    required:
    - accuracy
    - latitude
    - longitude
    type: object
info:
  contact: {}
  description: Location tracking API
  title: Trackr API
  version: 0.2.1
paths:
  /api/v1/auth/login:
    post:
      description: Authenticates the user via API key and logs the login event.
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - invalid or missing API key
      security:
      - ApiKeyAuth: []
      summary: User login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: Logs the logout event for the authenticated user.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized - invalid or missing API key
      security:
      - ApiKeyAuth: []
      summary: User logout
      tags:
      - auth
  /api/v1/invite:
    post:
      description: Admin-only endpoint that creates a new invite link with a randomly
        generated code, valid for 5 minutes.
      produces:
      - text/plain
      responses:
        "201":
          description: Full invite URL
          schema:
            type: string
        "403":
          description: Forbidden - only admins can create invite links
        "500":
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Create an invite link
      tags:
      - invites
  /api/v1/locations:
    get:
      description: Retrieves all location records from the database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.LocationResponse'
            type: array
        "500":
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: List all locations
      tags:
      - locations
    post:
      consumes:
      - application/json
      description: Records a new location for the authenticated user.
      parameters:
      - description: Location data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.PostLocationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.LocationResponse'
        "422":
          description: Unprocessable Entity - invalid request body
        "500":
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: Create a location
      tags:
      - locations
  /api/v1/users:
    post:
      consumes:
      - application/json
      description: Guest-only endpoint that creates a new user when provided a valid
        invite code.
      parameters:
      - description: User details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserRequest'
      produces:
      - text/plain
      responses:
        "201":
          description: Generated API key
          schema:
            type: string
        "400":
          description: Bad Request
        "403":
          description: Forbidden - the invite link has been used
        "422":
          description: Unprocessable Entity - invalid request body
        "500":
          description: Internal Server Error
      summary: Create a new user
      tags:
      - users
  /api/v1/users/locations/latest:
    get:
      description: Retrieves all latest location records from the database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.LocationResponse'
            type: array
        "500":
          description: Internal Server Error
      security:
      - ApiKeyAuth: []
      summary: List every member's latest locations
      tags:
      - locations
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
